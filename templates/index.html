<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Evaluation Model</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Car Evaluation Model</h1>
            <p>Insira os parâmetros do veículo para obter uma avaliação</p>
        </header>

        <main>
            <div class="form-section">
                <form id="predictionForm">
                    <div class="form-group">
                        <label for="buying_price">Preço de Compra (R$):</label>
                        <input type="number" id="buying_price" name="buying_price" min="0" placeholder="Ex: 200000" required>
                    </div>

                    <div class="form-group">
                        <label for="maint_cost">Custo de Manutenção Anual (R$):</label>
                        <input type="number" id="maint_cost" name="maint_cost" min="0" placeholder="Ex: 15000" required>
                    </div>

                    <div class="form-group">
                        <label for="doors">Número de Portas:</label>
                        <select id="doors" name="doors" required>
                            <option value="">Selecione...</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5more">5 ou mais</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="persons">Capacidade de Passageiros:</label>
                        <select id="persons" name="persons" required>
                            <option value="">Selecione...</option>
                            <option value="2">2</option>
                            <option value="4">4</option>
                            <option value="more">Mais de 5</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="lug_boot_liters">Capacidade do Porta-Malas (litros):</label>
                        <input type="number" id="lug_boot_liters" name="lug_boot_liters" min="0" placeholder="Ex: 350" required>
                    </div>

                    <div class="form-group">
                        <label for="safety">Classificação de Segurança:</label>
                        <select id="safety" name="safety" required>
                            <option value="">Selecione...</option>
                            <option value="low">Baixa</option>
                            <option value="med">Média</option>
                            <option value="high">Alta</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-predict">Fazer Predição</button>
                </form>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <h2>Resultado da Avaliação</h2>
                <div class="result-card">
                    <div class="result-main">
                        <p class="label">Classificação:</p>
                        <p class="prediction" id="predictionResult">-</p>
                    </div>
                </div>
            </div>

            <div class="error-section" id="errorSection" style="display: none;">
                <p class="error-message" id="errorMessage">-</p>
            </div>

            <div class="loading" id="loadingSpinner" style="display: none;">
                <div class="spinner"></div>
                <p>Processando...</p>
            </div>
        </main>

        <footer>
            <p>Car Evaluation Model API | Desenvolvido com Flask</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
